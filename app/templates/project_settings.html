{% extends "base.html" %}
{% set active_tab = "settings" %}
{% set current_project = project %}
{% block title %}Settings – {{ project.name }}{% endblock %}
{% block page_title %}Project Settings{% endblock %}

{% block content %}
<div class="card" style="max-width:500px">
  <h2>Edit Project</h2>
  <form method="post" action="{{ url_for('project_settings_save', project_id=project.id) }}">
    <label>Name</label>
    <input type="text" name="name" value="{{ project.name }}" required/>
    <label>Description</label>
    <textarea name="description">{{ project.description }}</textarea>
    <label>Face Detection Model</label>
    <select name="face_detection_model">
      <option value="cnn" {% if project.settings.get('face_detection_model', 'cnn') == 'cnn' %}selected{% endif %}>CNN (accurate, slower)</option>
      <option value="hog" {% if project.settings.get('face_detection_model', 'cnn') == 'hog' %}selected{% endif %}>HOG (fast, less accurate)</option>
    </select>
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{{ url_for('project_photos', project_id=project.id) }}" class="btn btn-secondary" style="margin-left:8px">Cancel</a>
  </form>
</div>

<div class="card" style="max-width:500px">
  <h2>Danger Zone</h2>
  <form method="post" action="{{ url_for('project_delete', project_id=project.id) }}"
        onsubmit="return confirm('Delete project {{ project.name | e }} and ALL its data? This cannot be undone.')">
    <button type="submit" class="btn btn-danger">Delete this project</button>
  </form>
</div>
{% endblock %}
